<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>400 Bad Request — Litesh Zadane</title>
<meta name="description" content="Bad Request">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/error-theme.css">
</head>
<body>
  <div class="card">
    <div class="term-bar">
      <span class="term-dot t1"></span><span class="term-dot t2"></span><span class="term-dot t3"></span>
      <span class="term-title">kubectl — eks-prod-cluster</span>
    </div>
    <div class="term-body">
      <div><span class="prompt">$</span> kubectl apply -f deploy.yaml</div>
      <div class="out-err">error: malformed request — invalid syntax</div>

      <div class="code">400</div>
      <div class="status-label">Bad Request</div>
      <p class="msg">Something in that request didn't look right. Please check the link or form and try again.</p>

      <div class="btn-row">
        <a class="btn btn-primary" href="/">Back to home →</a>
        <a class="btn btn-ghost" href="https://github.com/liteshz1778" target="_blank" rel="noopener">View GitHub</a>
      </div>

      <div style="margin-top:22px;color:var(--text-faint);">
        <span class="prompt">$</span> <span class="cursor"></span>
      </div>
    </div>
  </div>
</body>
</html>
